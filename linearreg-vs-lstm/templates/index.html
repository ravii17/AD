<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Predictor | LR & LSTM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .sidebar {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .main-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-sub);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: var(--text-sub);
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-sub);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .loader {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">StockPredict AI</div>
        <div style="color: var(--text-sub); font-size: 0.875rem;">Model: LR + LSTM</div>
    </nav>

    <div class="container">
        <div class="sidebar">
            <h2>Forecasting</h2>
            <div class="form-group">
                <label for="days">Days to Predict</label>
                <input type="number" id="days" value="30" min="1" max="365">
            </div>
            <button id="predictBtn">Generate Prediction</button>
            <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-sub);">
                Note: Linear Regression shows general trend, while LSTM accounts for historical sequence patterns.
            </div>
        </div>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Stock Symbol</div>
                    <div class="stat-value">20MICRONS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">LR Forecast</div>
                    <div class="stat-value" id="lrValue">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">LSTM Forecast</div>
                    <div class="stat-value" id="lstmValue">--</div>
                </div>
            </div>

            <div class="chart-container">
                <div class="loading-overlay" id="loading">
                    <div class="loader"></div>
                </div>
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const predictBtn = document.getElementById('predictBtn');
        const daysInput = document.getElementById('days');
        const loading = document.getElementById('loading');
        const lrVal = document.getElementById('lrValue');
        const lstmVal = document.getElementById('lstmValue');

        let mainChart = null;

        async function init() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                renderChart(data);
            } catch (err) {
                console.error("Failed to load historical data", err);
            }
        }

        function renderChart(historicalData, predictions = null) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            // Slice to show only the last 150 days for better prediction visibility
            const lookback = 150;
            const recentHistory = historicalData.slice(-lookback);
            
            const labels = recentHistory.map(d => d.date);
            const values = recentHistory.map(d => d.value);

            const datasets = [
                {
                    label: 'Historical Price',
                    data: values,
                    borderColor: '#94a3b8',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }
            ];

            if (predictions) {
                // Combine labels
                const allLabels = [...labels, ...predictions.dates];
                
                // LR Dataset
                const lrData = new Array(labels.length).fill(null);
                lrData[labels.length - 1] = values[values.length - 1]; // Connect to last historical
                lrData.push(...predictions.lr);

                datasets.push({
                    label: 'LR Prediction',
                    data: lrData,
                    borderColor: '#2563eb',
                    borderDash: [5, 5],
                    borderWidth: 3,
                    pointRadius: 0,
                    fill: false
                });

                // LSTM Dataset
                const lstmData = new Array(labels.length).fill(null);
                lstmData[labels.length - 1] = values[values.length - 1]; // Connect to last historical
                lstmData.push(...predictions.lstm);

                datasets.push({
                    label: 'LSTM Prediction',
                    data: lstmData,
                    borderColor: '#10b981',
                    borderWidth: 3,
                    pointRadius: 0,
                    fill: false
                });

                // Update cards
                lrVal.innerText = `₹${predictions.lr[predictions.lr.length - 1].toFixed(2)}`;
                lstmVal.innerText = `₹${predictions.lstm[predictions.lstm.length - 1].toFixed(2)}`;

                if (mainChart) mainChart.destroy();
                
                mainChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: allLabels, datasets: datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: { backgroundColor: 'white', titleColor: '#1e293b', bodyColor: '#64748b', borderColor: '#e2e8f0', borderWidth: 1 }
                        },
                        scales: {
                            y: { grid: { color: '#f1f5f9' }, title: { display: true, text: 'Price ($)' } },
                            x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } }
                        }
                    }
                });
            } else {
                if (mainChart) mainChart.destroy();
                
                mainChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' } },
                        scales: {
                            y: { grid: { color: '#f1f5f9' }, title: { display: true, text: 'Price ($)' } },
                            x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } }
                        }
                    }
                });
            }
        }

        predictBtn.addEventListener('click', async () => {
            const days = daysInput.value;
            loading.style.display = 'flex';
            predictBtn.disabled = true;

            try {
                // Get historical data first to ensure chart is fresh
                const histResp = await fetch('/api/data');
                const histData = await histResp.json();

                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ days: days })
                });
                const result = await response.json();
                
                renderChart(histData, result);
            } catch (err) {
                alert("Error getting prediction. Make sure server is running.");
            } finally {
                loading.style.display = 'none';
                predictBtn.disabled = false;
            }
        });

        init();
    </script>
</body>
</html>
